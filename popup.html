<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="container">
    <div id="count">–</div>
    <div id="label">open tabs</div>
    <div id="message"></div>
  </div>
  <div id="settings-toggle">Settings <span id="arrow">&#9662;</span></div>
  <div id="settings" class="collapsed">
    <div class="group">
      <div class="group-title">Warnings</div>
      <div class="setting">
        <label><input type="checkbox" id="opt-badge"><span>Badge color</span></label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="opt-pageBorder"><span>Page border</span></label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="opt-dynamicIcon"><span>Icon color</span></label>
      </div>
    </div>
    <div class="group">
      <div class="group-title">Thresholds</div>
      <div class="limit">
        <label for="limit-warn">Warning at</label>
        <input type="number" id="limit-warn" min="1" max="50">
      </div>
      <div class="limit">
        <label for="limit-danger">Danger at</label>
        <input type="number" id="limit-danger" min="2" max="100">
      </div>
    </div>
  </div>
  <script src="settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
