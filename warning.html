<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="warning.css">
</head>
<body>
  <div id="container">
    <div id="icon">&#9888;</div>
    <h1>Do you REALLY need another tab?</h1>
    <p id="count-msg">You have <span id="count">?</span> tabs open.</p>
    <p id="subtitle">That's too many. You know it.</p>
    <div id="buttons">
      <button id="close-tab">Close the new tab</button>
      <button id="keep-tab">I need this tab</button>
    </div>
  </div>
  <script src="warning.js"></script>
</body>
</html>
